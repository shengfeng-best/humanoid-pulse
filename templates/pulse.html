<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>人形脉冲 №{{number_padded}} · {{date_range}}</title>
  <!-- Build may inline fonts.css; path is relative to templates/ for local preview -->
  <link rel="stylesheet" href="../../assets/fonts/fonts.css" />
  <style>
    :root {
      --paper: #F4F1EA;
      --ink: #1A1A1A;
      --muted: #5C574F;
      --rule: #D9D2C5;
      --accent: #9A6350;
      --source: #8A847C;
      --wash: #EBE6DC;
    }

    *, *::before, *::after { box-sizing: border-box; }

    html {
      font-size: 16px;
      -webkit-text-size-adjust: 100%;
    }

    body {
      margin: 0;
      background:
        radial-gradient(ellipse 80% 50% at 50% -10%, #ebe4d6 0%, transparent 55%),
        var(--paper);
      color: var(--ink);
      font-family: "Noto Serif SC", "Source Serif 4", Georgia, serif;
      font-size: 16px;
      line-height: 1.7;
    }

    a {
      color: var(--ink);
      text-decoration-thickness: 1px;
      text-underline-offset: 0.18em;
    }

    a:hover { color: var(--accent); }

    .wrap {
      max-width: 960px;
      margin: 0 auto;
      padding: 2.25rem 1.5rem 5rem;
    }

    .masthead {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      justify-content: space-between;
      gap: 0.5rem 1.5rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--rule);
      font-family: system-ui, sans-serif;
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .masthead-brand {
      color: var(--accent);
      font-weight: 600;
    }

    .masthead-date { letter-spacing: 0.08em; text-transform: none; }

    .issue-title {
      margin: 1.5rem 0 0.75rem;
      font-size: 48px;
      line-height: 1.08;
      font-weight: 400;
      letter-spacing: 0.02em;
    }

    .lede {
      margin: 0 0 1.5rem;
      max-width: 42em;
      color: var(--muted);
      font-size: 17px;
      line-height: 1.7;
    }

    .cover {
      margin: 0 0 2rem;
    }

    .cover-frame {
      margin: 0;
      background: var(--wash);
      overflow: hidden;
    }

    .cover-image {
      display: block;
      width: 100%;
      height: clamp(220px, 42vh, 480px);
      object-fit: cover;
      object-position: center 40%;
    }

    .cover-caption {
      margin: 0.65rem 0 0;
      font-family: system-ui, sans-serif;
      font-size: 11px;
      letter-spacing: 0.08em;
      color: var(--source);
    }

    .anchors {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.85rem 1.25rem;
      margin: 0 0 2.75rem;
      padding: 1.15rem 0;
      border-top: 1px solid var(--rule);
      border-bottom: 1px solid var(--rule);
      list-style: none;
    }

    .anchors a {
      display: block;
      padding: 0.35rem 0;
      font-family: system-ui, sans-serif;
      font-size: 11px;
      letter-spacing: 0.16em;
      text-decoration: none;
      color: var(--muted);
    }

    .anchors a:hover { color: var(--accent); }

    .anchors .num {
      display: block;
      margin-bottom: 0.4rem;
      color: var(--accent);
      font-weight: 600;
    }

    .anchors .label {
      font-family: "Noto Serif SC", "Source Serif 4", Georgia, serif;
      font-size: 17px;
      letter-spacing: 0;
      color: var(--ink);
      text-transform: none;
    }

    .section {
      margin: 0 0 3.25rem;
    }

    .section-label {
      margin: 0 0 1.25rem;
      padding-bottom: 0.55rem;
      border-bottom: 2px solid var(--ink);
      font-family: system-ui, sans-serif;
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 600;
    }

    .item {
      padding: 1.45rem 0;
      border-top: 1px solid var(--rule);
    }

    .item:first-of-type { border-top: none; padding-top: 0.25rem; }

    .item--with-image {
      display: grid;
      grid-template-columns: 1.35fr 1fr;
      gap: 1.35rem 1.75rem;
      align-items: start;
    }

    .item--featured {
      display: block;
      padding: 1.75rem 0 2rem;
      margin-bottom: 0.35rem;
      border-top: none;
      border-bottom: 1px solid var(--rule);
    }

    .item--featured .item-image-wrap {
      margin: 0 0 1.15rem;
      background: var(--wash);
      overflow: hidden;
    }

    .item--featured .item-image {
      width: 100%;
      height: clamp(200px, 36vh, 420px);
      object-fit: cover;
    }

    .item--featured .item-title {
      font-size: 28px;
      line-height: 1.25;
      max-width: 22em;
    }

    .item--featured .item-summary {
      max-width: 42em;
      font-size: 16.5px;
    }

    .item-kicker {
      margin: 0 0 0.45rem;
      font-family: system-ui, sans-serif;
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 600;
    }

    .item-title {
      margin: 0 0 0.55rem;
      font-size: 20px;
      line-height: 1.35;
      font-weight: 400;
    }

    .item-title a { text-decoration: none; }
    .item-title a:hover { text-decoration: underline; }

    .item-summary {
      margin: 0 0 0.75rem;
      color: var(--ink);
    }

    .item-source {
      margin: 0;
      font-family: system-ui, sans-serif;
      font-size: 11px;
      letter-spacing: 0.16em;
      color: var(--source);
    }

    .item-image-wrap {
      margin: 0;
      background: var(--wash);
      overflow: hidden;
    }

    .item-image {
      display: block;
      width: 100%;
      height: auto;
      vertical-align: middle;
      border: 0;
    }

    .item--with-image:not(.item--featured) .item-image {
      aspect-ratio: 4 / 3;
      object-fit: cover;
      min-height: 140px;
    }

    .item-body { min-width: 0; }

    .footer {
      margin-top: 3rem;
      padding-top: 1.35rem;
      border-top: 1px solid var(--rule);
      font-family: system-ui, sans-serif;
      font-size: 11px;
      letter-spacing: 0.08em;
      color: var(--muted);
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem 1.5rem;
      justify-content: space-between;
    }

    .footer a { color: var(--muted); }
    .footer a:hover { color: var(--accent); }

    @media (max-width: 720px) {
      .issue-title { font-size: 34px; }
      .anchors { grid-template-columns: 1fr; }
      .item--with-image { grid-template-columns: 1fr; }
      .item--with-image .item-image-wrap { order: -1; }
      .item--featured .item-title { font-size: 24px; }
    }
  </style>
</head>
<body>
  <article class="wrap">
    <header class="masthead">
      <span class="masthead-brand">PULSE · №{{number_padded}}</span>
      <span class="masthead-date">{{date_range}}</span>
    </header>

    <h1 class="issue-title">人形脉冲</h1>
    <p class="lede">{{lede}}</p>

    {{cover_html}}

    <nav aria-label="本期锚点">
      <ul class="anchors">
        <li>
          <a href="#section-policy">
            <span class="num">01</span>
            <span class="label">国内政策</span>
          </a>
        </li>
        <li>
          <a href="#section-frontier">
            <span class="num">02</span>
            <span class="label">国外前沿</span>
          </a>
        </li>
        <li>
          <a href="#section-news">
            <span class="num">03</span>
            <span class="label">重点新闻</span>
          </a>
        </li>
      </ul>
    </nav>

    {{sections_html}}

    <footer class="footer">
      <span>在线阅读：<a href="{{pages_url}}">{{pages_url}}</a></span>
      <span>下期预告 {{next_label}}</span>
    </footer>
  </article>
</body>
</html>
