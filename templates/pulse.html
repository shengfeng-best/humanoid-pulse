<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>人形脉冲 №{{number_padded}} · {{date_range}}</title>
  <!-- Build may inline fonts.css; path is relative to templates/ for local preview -->
  <link rel="stylesheet" href="../../assets/fonts/fonts.css" />
  <style>
    :root {
      --paper: #F3EFE6;
      --ink: #141210;
      --muted: #4F4A43;
      --rule: #D4CBBC;
      --accent: #8B5342;
      --source: #7A746C;
      --wash: #E7E0D3;
      --surface: #FAF7F1;
    }

    *, *::before, *::after { box-sizing: border-box; }

    html {
      /* 手机偏大、桌面随屏宽略增，避免手机反而缩小 */
      font-size: clamp(19.5px, 0.55vw + 17.5px, 21.5px);
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }

    body {
      margin: 0;
      background:
        radial-gradient(ellipse 90% 55% at 50% -8%, #e8e0d2 0%, transparent 58%),
        var(--paper);
      color: var(--ink);
      font-family: "Noto Serif SC", "Source Serif 4", Georgia, serif;
      font-size: 1.05rem;
      line-height: 1.85;
      font-feature-settings: "kern" 1, "liga" 1;
      text-rendering: optimizeLegibility;
      -webkit-font-smoothing: antialiased;
    }

    a {
      color: var(--ink);
      text-decoration-thickness: 1px;
      text-underline-offset: 0.22em;
    }

    a:hover { color: var(--accent); }

    .wrap {
      width: min(100% - 2.5rem, 1280px);
      max-width: 1280px;
      margin: 0 auto;
      padding: 2.75rem 0 5.5rem;
    }

    .masthead {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      justify-content: space-between;
      gap: 0.65rem 1.75rem;
      padding: 0 0 1.15rem;
      border-bottom: 2px solid var(--ink);
      box-shadow: 0 1px 0 var(--rule);
      font-family: system-ui, sans-serif;
      font-size: 0.78rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .masthead-brand {
      color: var(--accent);
      font-weight: 650;
    }

    .masthead-date {
      letter-spacing: 0.06em;
      text-transform: none;
      font-variant-numeric: tabular-nums;
    }

    .issue-title {
      margin: 2rem 0 1rem;
      font-size: clamp(2.75rem, 5.5vw, 4.25rem);
      line-height: 1.05;
      font-weight: 400;
      letter-spacing: 0.04em;
    }

    .lede {
      margin: 0 0 2rem;
      max-width: min(52em, 100%);
      color: var(--muted);
      font-size: 1.15rem;
      line-height: 1.8;
    }

    .cover {
      margin: 0 0 2.5rem;
    }

    .cover-frame {
      margin: 0;
      background: var(--wash);
      overflow: hidden;
    }

    .cover-image {
      display: block;
      width: 100%;
      height: clamp(260px, 48vh, 560px);
      object-fit: cover;
      object-position: center 38%;
    }

    .cover-caption {
      margin: 0.85rem 0 0;
      padding-top: 0.65rem;
      border-top: 1px solid var(--rule);
      font-family: system-ui, sans-serif;
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      color: var(--source);
    }

    .anchors {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem 1.5rem;
      margin: 0 0 3.25rem;
      padding: 1.35rem 0;
      border-top: 1px solid var(--rule);
      border-bottom: 1px solid var(--rule);
      list-style: none;
      background: linear-gradient(180deg, var(--surface) 0%, transparent 100%);
    }

    .anchors a {
      display: block;
      padding: 0.45rem 0;
      font-family: system-ui, sans-serif;
      font-size: 0.78rem;
      letter-spacing: 0.16em;
      text-decoration: none;
      color: var(--muted);
    }

    .anchors a:hover { color: var(--accent); }

    .anchors .num {
      display: block;
      margin-bottom: 0.5rem;
      color: var(--accent);
      font-weight: 650;
    }

    .anchors .label {
      font-family: "Noto Serif SC", "Source Serif 4", Georgia, serif;
      font-size: 1.2rem;
      letter-spacing: 0.02em;
      color: var(--ink);
      text-transform: none;
      line-height: 1.35;
    }

    .section {
      margin: 0 0 3.75rem;
    }

    .section-label {
      margin: 0 0 1.5rem;
      padding-bottom: 0.7rem;
      border-bottom: 2.5px solid var(--ink);
      font-family: system-ui, sans-serif;
      font-size: 0.82rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 650;
    }

    .item {
      padding: 1.85rem 0;
      border-top: 1px solid var(--rule);
    }

    .item:first-of-type { border-top: none; padding-top: 0.35rem; }

    .item--with-image {
      display: grid;
      grid-template-columns: minmax(0, 1.55fr) minmax(240px, 0.9fr);
      gap: 1.75rem 2.25rem;
      align-items: start;
    }

    .item--featured {
      display: block;
      padding: 2.25rem 0 2.5rem;
      margin: 0.5rem 0 1rem;
      border-top: none;
      border-bottom: 1px solid var(--rule);
      background: linear-gradient(180deg, var(--surface) 0%, transparent 72%);
    }

    .item--featured .item-image-wrap {
      margin: 0 0 1.4rem;
      background: var(--wash);
      overflow: hidden;
    }

    .item--featured .item-image {
      width: 100%;
      height: clamp(240px, 40vh, 520px);
      object-fit: cover;
    }

    .item--featured .item-title {
      font-size: clamp(1.75rem, 2.8vw, 2.35rem);
      line-height: 1.28;
      max-width: min(28em, 100%);
      letter-spacing: 0.01em;
    }

    .item--featured .item-summary {
      max-width: min(52em, 100%);
      font-size: 1.08rem;
      line-height: 1.85;
    }

    .item-kicker {
      margin: 0 0 0.55rem;
      font-family: system-ui, sans-serif;
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 650;
    }

    .item-title {
      margin: 0 0 0.7rem;
      font-size: 1.42rem;
      line-height: 1.38;
      font-weight: 400;
      letter-spacing: 0.01em;
    }

    .item-title a { text-decoration: none; }
    .item-title a:hover { text-decoration: underline; }

    .item-summary {
      margin: 0 0 0.9rem;
      max-width: min(52em, 100%);
      color: var(--ink);
      font-size: 1.05rem;
      line-height: 1.85;
    }

    .item-source {
      margin: 0;
      font-family: system-ui, sans-serif;
      font-size: 0.78rem;
      letter-spacing: 0.14em;
      color: var(--source);
    }

    .item-image-wrap {
      margin: 0;
      background: var(--wash);
      overflow: hidden;
    }

    .item-image {
      display: block;
      width: 100%;
      height: auto;
      vertical-align: middle;
      border: 0;
    }

    .item--with-image:not(.item--featured) .item-image {
      aspect-ratio: 4 / 3;
      object-fit: cover;
      min-height: 180px;
    }

    .item-body { min-width: 0; }

    .footer {
      margin-top: 3.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--rule);
      font-family: system-ui, sans-serif;
      font-size: 0.78rem;
      letter-spacing: 0.08em;
      color: var(--muted);
      display: flex;
      flex-wrap: wrap;
      gap: 0.85rem 1.75rem;
      justify-content: space-between;
    }

    .footer a { color: var(--muted); }
    .footer a:hover { color: var(--accent); }

    /* 平板：仍双栏，略收紧 */
    @media (max-width: 960px) {
      .wrap { width: min(100% - 2rem, 1280px); }
      .item--with-image {
        grid-template-columns: minmax(0, 1.35fr) minmax(200px, 0.95fr);
        gap: 1.35rem 1.5rem;
      }
    }

    /* 手机：更大字号、单栏、更好点按 */
    @media (max-width: 720px) {
      html { font-size: clamp(20px, 4.6vw, 22px); }
      body { line-height: 1.9; }
      .wrap {
        width: min(100% - 1.5rem, 1280px);
        padding: 1.5rem 0 4rem;
      }
      .masthead { font-size: 0.72rem; letter-spacing: 0.12em; }
      .issue-title {
        margin: 1.35rem 0 0.85rem;
        font-size: clamp(2.4rem, 11vw, 3rem);
      }
      .lede { font-size: 1.08rem; max-width: none; }
      .anchors {
        grid-template-columns: 1fr;
        gap: 0.35rem;
        margin-bottom: 2.25rem;
      }
      .anchors .label { font-size: 1.15rem; }
      .cover-image { height: clamp(200px, 38vh, 320px); }
      .item { padding: 1.55rem 0; }
      .item--with-image { grid-template-columns: 1fr; }
      .item--with-image .item-image-wrap { order: -1; margin-bottom: 0.85rem; }
      .item--with-image:not(.item--featured) .item-image {
        min-height: 200px;
        aspect-ratio: 16 / 10;
      }
      .item--featured { padding: 1.5rem 0 1.85rem; }
      .item--featured .item-title { font-size: 1.55rem; max-width: none; }
      .item--featured .item-summary,
      .item-summary { max-width: none; font-size: 1.05rem; }
      .item-title { font-size: 1.28rem; }
      .item-kicker { font-size: 0.72rem; }
      .footer { font-size: 0.75rem; word-break: break-all; }
    }

    /* 大屏桌面：用满宽栏，正文不再人为收窄 */
    @media (min-width: 1200px) {
      .wrap { width: min(100% - 4rem, 1320px); }
      .item--with-image {
        grid-template-columns: minmax(0, 1.65fr) minmax(280px, 0.85fr);
      }
    }
  </style>
</head>
<body>
  <article class="wrap">
    <header class="masthead">
      <span class="masthead-brand">PULSE · №{{number_padded}}</span>
      <span class="masthead-date">{{date_range}}</span>
    </header>

    <h1 class="issue-title">人形脉冲</h1>
    <p class="lede">{{lede}}</p>

    {{cover_html}}

    <nav aria-label="本期锚点">
      <ul class="anchors">
        <li>
          <a href="#section-policy">
            <span class="num">01</span>
            <span class="label">国内政策</span>
          </a>
        </li>
        <li>
          <a href="#section-frontier">
            <span class="num">02</span>
            <span class="label">国外前沿</span>
          </a>
        </li>
        <li>
          <a href="#section-news">
            <span class="num">03</span>
            <span class="label">重点新闻</span>
          </a>
        </li>
      </ul>
    </nav>

    {{sections_html}}

    <footer class="footer">
      <span>在线阅读：<a href="{{pages_url}}">{{pages_url}}</a></span>
      <span>下期预告 {{next_label}}</span>
    </footer>
  </article>
</body>
</html>
